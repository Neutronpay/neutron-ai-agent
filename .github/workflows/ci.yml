name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Checkout neutron-sdk
        uses: actions/checkout@v4
        with:
          repository: Neutronpay/neutron-sdk
          path: neutron-sdk

      - name: Checkout neutron-ai-agent
        uses: actions/checkout@v4
        with:
          repository: Neutronpay/neutron-ai-agent
          path: neutron-ai-agent

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: neutron-ai-agent
        run: npm install

      - name: Build
        working-directory: neutron-ai-agent
        run: npm run build
